services:
  postgres:
    image: postgres:16-alpine
    container_name: cookwhat-postgres
    environment:
      POSTGRES_DB: cookwhat
      POSTGRES_USER: cookwhat
      POSTGRES_PASSWORD: cookwhat_password
    ports:
      - "5432:5432"
    volumes:
      - cookwhat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookwhat -d cookwhat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cookwhat_postgres_data:
