<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CookWhat Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>" />
  <link rel="stylesheet" href="/static/styles.css?v=20260515-4" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-row">
        <div>
          <div class="brand">CookWhat</div>
          <div class="brand-subtitle">AI nấu ăn</div>
        </div>
        <button class="icon-button mobile-menu" id="closeSidebar" aria-label="Đóng lịch sử">
          <span aria-hidden="true">×</span>
        </button>
      </div>

      <button class="new-chat-button" id="newChatButton">
        <span aria-hidden="true">+</span>
        Chat mới
      </button>

      <div class="history-header">Lịch sử</div>
      <nav class="session-list" id="sessionList" aria-label="Lịch sử chat"></nav>
    </aside>

    <main class="chat-panel">
      <header class="topbar">
        <button class="icon-button desktop-hidden" id="openSidebar" aria-label="Mở lịch sử">
          <span aria-hidden="true">☰</span>
        </button>
        <div>
          <h1>CookWhat Chat</h1>
          <p>Nhập nguyên liệu bạn đang có, mình sẽ gợi ý món phù hợp.</p>
        </div>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <form class="composer" id="chatForm">
        <!-- Image preview badge (hidden until image is attached) -->
        <div class="image-preview-bar" id="imagePreviewBar" hidden>
          <img id="imagePreviewThumb" src="" alt="" aria-hidden="true" />
          <span id="imagePreviewName" class="image-preview-name"></span>
          <button type="button" id="imageRemoveButton" class="image-remove-btn" aria-label="Xóa ảnh đã chọn" title="Xóa ảnh">
            <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <!-- Inner row: textarea + buttons -->
        <div class="composer-inner-row">
          <textarea id="messageInput" rows="1" placeholder="Ví dụ: Mình có gà, trứng, hành lá..."
            autocomplete="off"></textarea>
          <div class="composer-actions">
            <!-- Hidden file input for image upload -->
            <input type="file" id="imageFileInput" accept="image/*" hidden />
            <button type="button" id="imageUploadButton" class="image-upload-btn" aria-label="Đính kèm hình ảnh" title="Đính kèm hình ảnh">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </button>
            <button type="button" id="micButton" class="mic-button" aria-label="Nhận dạng giọng nói"
              title="Nhận dạng giọng nói">
              <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" />
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <line x1="12" y1="19" x2="12" y2="22" />
              </svg>
            </button>
            <button type="submit" id="sendButton" aria-label="Gửi tin nhắn">
              <span>Gửi</span>
            </button>
          </div>
        </div>
      </form>

    </main>
  </div>

  <div class="confirm-modal" id="deleteModal" aria-hidden="true" hidden>
    <div class="confirm-backdrop" data-dismiss="true"></div>
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h2 id="deleteModalTitle">Xóa đoạn chat này?</h2>
      <p id="deleteModalDescription">Đoạn chat sẽ bị xóa khỏi danh sách và dữ liệu lưu trữ.</p>
      <div class="confirm-actions">
        <button type="button" class="confirm-button secondary" id="deleteModalCancel">Hủy</button>
        <button type="button" class="confirm-button danger" id="deleteModalConfirm">Xóa</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=20260515-4"></script>
</body>

</html>
